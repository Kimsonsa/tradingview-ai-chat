<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FFFFF0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>TradeAI Assistant</title>
  <meta name="description" content="AI 트레이딩 어시스턴트 - 실시간 차트 분석">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #FFFFF0; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    /* 로딩 화면 */
    .loader {
      position: fixed;
      inset: 0;
      background: #FFFFF0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .loader.hidden { opacity: 0; pointer-events: none; }
    .loader-icon {
      font-size: 48px;
      margin-bottom: 16px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .loader-text {
      color: #3D3425;
      font-size: 18px;
      font-weight: 600;
    }
    .loader-sub {
      color: #9A8B78;
      font-size: 13px;
      margin-top: 8px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }
  </style>
</head>
<body>
  <!-- 로딩 화면 -->
  <div class="loader" id="loader">
    <div class="loader-icon">◈</div>
    <div class="loader-text">TradeAI Assistant</div>
    <div class="loader-sub">로딩 중...</div>
  </div>

  <!-- Streamlit 앱을 전체 화면으로 삽입 -->
  <iframe id="app" src="http://localhost:8502" allow="clipboard-read; clipboard-write"></iframe>

  <script>
    const iframe = document.getElementById('app');
    const loader = document.getElementById('loader');

    iframe.addEventListener('load', () => {
      setTimeout(() => {
        loader.classList.add('hidden');
        setTimeout(() => loader.remove(), 500);
      }, 300);
    });

    // 10초 후에도 로딩 안되면 강제 표시
    setTimeout(() => {
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(() => loader.remove(), 500);
      }
    }, 10000);

    // Service Worker 등록
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW failed:', err));
      });
    }
  </script>
</body>
</html>
