<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>/* __STYLES__ */</style>
</head>
<body>
  <!-- Header -->
  <header id="app-header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">Trade<span class="logo-accent">AI</span></span>
      </div>
      <div class="symbol-badge" id="symbolBadge">
        <span class="badge-dot"></span>
        <span id="symbolText">BTCUSDT.P</span>
      </div>
    </div>
    <div class="header-center">
      <div class="timeframe-group" id="timeframeGroup">
        <button class="tf-btn" data-interval="1">1분</button>
        <button class="tf-btn" data-interval="5">5분</button>
        <button class="tf-btn" data-interval="15">15분</button>
        <button class="tf-btn active" data-interval="60">1시간</button>
        <button class="tf-btn" data-interval="240">4시간</button>
        <button class="tf-btn" data-interval="D">1일</button>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="settingsBtn" title="API 설정">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main id="app-main">
    <section class="chart-panel" id="chartPanel">
      <div class="chart-container" id="tvWidgetContainer"></div>
    </section>

    <div class="resize-handle" id="resizeHandle">
      <div class="resize-dots"><span></span><span></span><span></span></div>
    </div>

    <section class="chat-panel" id="chatPanel">
      <div class="chat-header">
        <div class="chat-header-info">
          <div class="ai-avatar-sm"><span>AI</span></div>
          <div>
            <h2>AI 트레이딩 어시스턴트</h2>
            <span class="chat-status" id="chatStatus">
              <span class="status-dot online"></span> 대기 중
            </span>
          </div>
        </div>
        <button class="icon-btn small" id="clearChatBtn" title="대화 초기화">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        </button>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="welcome-message">
          <div class="ai-avatar"><span>◈</span></div>
          <h3>AI 트레이딩 어시스턴트</h3>
          <p>차트를 보면서 궁금한 점을 물어보세요.<br>기술적 분석, 매매 전략, 지지/저항 분석을 도와드립니다.</p>
          <div class="quick-actions" id="quickActions">
            <button class="quick-btn" data-msg="현재 차트 기술적 분석을 해주세요">📊 차트 분석</button>
            <button class="quick-btn" data-msg="현재 매매 전략을 제안해주세요">💡 매매 전략</button>
            <button class="quick-btn" data-msg="주요 지지선과 저항선을 알려주세요">📐 지지/저항</button>
            <button class="quick-btn" data-msg="현재 RSI와 EMA 상태를 분석해주세요">📈 지표 분석</button>
          </div>
        </div>
      </div>

      <div class="chat-input-area">
        <div class="input-context" id="inputContext">
          <span class="context-tag">
            <span class="context-symbol" id="contextSymbol">BTCUSDT.P</span>
            <span class="context-tf" id="contextTf">1시간</span>
          </span>
        </div>
        <div class="chat-input-wrapper">
          <textarea id="chatInput" placeholder="차트에 대해 질문하세요..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" title="전송">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h3>⚙️ API 설정</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="apiKeyInput">OpenAI API 키</label>
          <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
          <span class="form-hint">API 키는 브라우저 로컬에만 저장됩니다.</span>
        </div>
        <div class="form-group">
          <label for="modelInput">모델</label>
          <select id="modelInput">
            <option value="gpt-5.5">GPT-5.5</option>
            <option value="gpt-4o">GPT-4o</option>
            <option value="gpt-4o-mini">GPT-4o Mini</option>
            <option value="gpt-4-turbo">GPT-4 Turbo</option>
            <option value="o3-mini">o3-mini</option>
          </select>
        </div>
        <button class="save-btn" id="saveKeyBtn">💾 저장</button>
        <div class="key-status" id="keyStatus"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>/* __CHAT_JS__ */</script>
  <script>/* __APP_JS__ */</script>
</body>
</html>
